name: Daily Dog Walking Reminder
on:
  schedule:
    - cron: '0 19 * * *'  # 19:00 UTC = 16:00 Buenos Aires
  workflow_dispatch:       # Manual trigger for testing
jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node .github/scripts/daily-reminder.js
        env:
          CALLMEBOT_KEY_FRANCO: ${{ secrets.CALLMEBOT_KEY_FRANCO }}
          CALLMEBOT_KEY_MANES: ${{ secrets.CALLMEBOT_KEY_MANES }}
          CALLMEBOT_KEY_SANTI: ${{ secrets.CALLMEBOT_KEY_SANTI }}
